<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小凯AI客服</title>
    <link th:href="@{/css/common.css}" rel="stylesheet">
    <link th:href="@{/css/chat.css}" rel="stylesheet">
</head>
<body>
    <div class="chat-page">
        <header class="header">
            <div class="container header-content">
                <a href="/" class="logo">小凯AI客服</a>
                <nav class="nav" id="mainNav">
                    <a href="/">对话</a>
                </nav>
                <div class="user-area" id="userArea">
                    <div class="user-dropdown">
                        <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()">
                            <span id="userName"></span>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="dropdown-menu" id="dropdownMenu">
                            <div class="dropdown-item" onclick="logout()">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                    <polyline points="16 17 21 12 16 7"></polyline>
                                    <line x1="21" y1="12" x2="9" y2="12"></line>
                                </svg>
                                退出登录
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="chat-main">
            <aside class="chat-sidebar">
                <div class="sidebar-header">
                    <h2>对话记录</h2>
                    <button class="new-chat-btn" onclick="newChat()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        新建对话
                    </button>
                </div>
                <div class="conversation-list" id="conversationList">
                </div>
            </aside>

            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-title">AI 智能助手</div>
                    <div class="chat-status">
                        <span class="status-dot"></span>
                        在线
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-icon">💬</div>
                        <h1 class="welcome-title">有什么可以帮您？</h1>
                        <p class="welcome-desc">我是 AI 智能客服，可以为您解答产品问题、处理售后咨询等。</p>
                        <div class="suggestions">
                            <button class="suggestion-btn" onclick="sendSuggestion('产品功能介绍')">
                                产品功能介绍
                                <span>了解我们的核心功能</span>
                            </button>
                            <button class="suggestion-btn" onclick="sendSuggestion('如何申请退款')">
                                如何申请退款
                                <span>退款流程和注意事项</span>
                            </button>
                            <button class="suggestion-btn" onclick="sendSuggestion('联系人工客服')">
                                联系人工客服
                                <span>转接人工服务</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <input type="text" class="chat-input" id="messageInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="sendSuggestion('转人工客服')">转人工</button>
                        <button class="quick-action-btn" onclick="sendSuggestion('查询订单状态')">查询订单</button>
                        <button class="quick-action-btn" onclick="sendSuggestion('常见问题')">常见问题</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/js/chat.js}"></script>
</body>
</html>
